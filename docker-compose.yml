services:
  pocketbase:
    image: 'ghcr.io/coollabsio/pocketbase:latest'
    environment:
      - SERVICE_URL_POCKETBASE_8080
    volumes:
      - 'pocketbase-data:/app/pb_data'
      - 'pocketbase-hooks:/app/pb_hooks'
      - './pb_migrations:/app/pb_migrations'

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_POCKETBASE_INSTANCE_URL=${SERVICE_URL_POCKETBASE}
    environment:
      - NEXT_PUBLIC_POCKETBASE_INSTANCE_URL=${SERVICE_URL_POCKETBASE}
    depends_on:
      - pocketbase

volumes:
  pocketbase-data:
  pocketbase-hooks:
